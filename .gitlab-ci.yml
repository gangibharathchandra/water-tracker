stages:
  - lint
  - format
  - type_check
  - test
  - coverage
  - security

lint:
  stage: lint
  script:
    - pip install ruff
    - ruff check .

format:
  stage: format
  script:
    - pip install ruff
    - ruff format --check .

type_check:
  stage: type_check
  script:
    - pip install mypy
    - mypy . || true

test:
  stage: test
  script:
    - pip install pytest
    - pytest

coverage:
  stage: coverage
  script:
    - pip install pytest pytest-cov
    - pytest --cov=.

dependency_audit:
  stage: security
  script:
    - pip install pip-audit
    - pip-auditgit add .
git commit -m "Improve CI quality checks and dependency audit"
git push origin main