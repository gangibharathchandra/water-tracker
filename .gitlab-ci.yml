stages:
  - lint
  - format
  - type_check
  - test
  - coverage
  - security

lint:
  stage: lint
  image: python:3.11
  script:
    - pip install ruff
    - ruff check .

format:
  stage: format
  image: python:3.11
  script:
    - pip install ruff
    - ruff format --check .

type_check:
  stage: type_check
  image: python:3.11
  script:
    - pip install mypy
    - mypy . || true

test:
  stage: test
  image: python:3.11
  script:
    - pip install pytest
    - pytest

coverage:
  stage: coverage
  image: python:3.11
  script:
    - pip install pytest pytest-cov
    - pytest --cov=. --cov-report=term

dependency_audit:
  stage: security
  image: python:3.11
  script:
    - pip install pip-audit
    - pip-audit || true